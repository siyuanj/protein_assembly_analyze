<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>Gamma-Secretase 进化分布图</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f9f9f9;
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 0;
            padding: 20px;
        }
        h2 {
            color: #333;
            margin-bottom: 10px;
        }
        .canvas-container {
            background: white;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            border-radius: 8px;
            padding: 20px;
            overflow: auto;
        }
        .legend {
            margin-top: 15px;
            display: flex;
            gap: 20px;
            font-size: 14px;
        }
        .legend-item {
            display: flex;
            align-items: center;
        }
        .dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            margin-right: 6px;
        }
    </style>
</head>
<body>

    <h2>Gamma-Secretase 四聚体在真核生物中的分布</h2>
    <p style="color: #666; font-size: 0.9em; max-width: 800px; text-align: center; margin-bottom: 20px;">
        基于当前 BLAST 结果与真核生物超类群分类 (Adl et al.)<br>
        重点关注 Amorphea 与 SAR 的保守性，以及 Excavata 的潜在缺失。
    </p>

    <div class="canvas-container">
        <canvas id="phyloTree" width="1000" height="600"></canvas>
    </div>

    <div class="legend">
        <div class="legend-item">
            <div class="dot" style="background-color: #2E7D32;"></div>
            <span>完整四聚体 (Complete)</span>
        </div>
        <div class="legend-item">
            <div class="dot" style="background-color: #C62828;"></div>
            <span>疑似缺失/不完整 (Partial/Missing)</span>
        </div>
        <div class="legend-item">
            <div class="dot" style="background-color: #999;"></div>
            <span>进化节点 (Taxonomy Group)</span>
        </div>
    </div>

<script>
    const canvas = document.getElementById('phyloTree');
    const ctx = canvas.getContext('2d');

    // ---------------------------------------------------------
    // 数据结构：模拟真核生物进化树
    // ---------------------------------------------------------
    const treeData = {
        name: "LECA (真核祖先)",
        type: "root",
        children: [
            {
                name: "Excavata (挖掘虫类)",
                type: "group",
                note: "基部/争议分支",
                children: [
                    {
                        name: "Discoba",
                        type: "subgroup",
                        children: [
                            { 
                                name: "Trypanosoma brucei (布氏锥虫)", 
                                type: "species", 
                                status: "missing",
                                note: "缺 APH-1, PEN-2"
                            }
                        ]
                    }
                ]
            },
            {
                name: "Diaphoretickes (泛植物/SAR)",
                type: "group",
                children: [
                    {
                        name: "SAR Supergroup",
                        type: "subgroup",
                        children: [
                            {
                                name: "Stramenopiles (不等鞭毛类)",
                                type: "subgroup",
                                children: [
                                    { name: "Phytophthora infestans (致病疫霉)", type: "species", status: "complete" },
                                    { name: "Saprolegnia (水霉)", type: "species", status: "complete" },
                                    { name: "Aphanomyces spp", type: "species", status: "complete" }
                                ]
                            }
                        ]
                    }
                ]
            },
            {
                name: "Amorphea (单鞭毛生物)",
                type: "group",
                children: [
                    {
                        name: "Amoebozoa (变形虫门)",
                        type: "subgroup",
                        children: [
                            { name: "Dictyostelium discoideum (盘基网柄菌)", type: "species", status: "complete" }
                        ]
                    },
                    {
                        name: "Opisthokonta (后鞭毛生物)",
                        type: "subgroup",
                        children: [
                            {
                                name: "Holozoa (全动物类)",
                                type: "subgroup",
                                children: [
                                    { 
                                        name: "Monosiga brevicollis (领鞭毛虫)", 
                                        type: "species", 
                                        status: "missing", 
                                        note: "缺 PEN-2 (疑假阴性)"
                                    },
                                    { 
                                        name: "Homo sapiens (人类)", 
                                        type: "species", 
                                        status: "complete",
                                        note: "对照组"
                                    }
                                ]
                            }
                        ]
                    }
                ]
            }
        ]
    };

    // ---------------------------------------------------------
    // 绘图逻辑
    // ---------------------------------------------------------
    
    // 配置参数
    const padding = { left: 50, right: 250, top: 50, bottom: 50 };
    const width = canvas.width;
    const height = canvas.height;
    
    // 计算叶子节点数量，用于分配垂直空间
    function countLeaves(node) {
        if (!node.children || node.children.length === 0) return 1;
        return node.children.reduce((acc, child) => acc + countLeaves(child), 0);
    }

    const totalLeaves = countLeaves(treeData);
    const leafHeight = (height - padding.top - padding.bottom) / (totalLeaves - 1);
    
    let currentLeafIndex = 0;

    // 递归绘制函数
    function drawNode(node, x, depth, parentY) {
        let y;
        
        // 1. 确定当前节点的 Y 坐标
        if (!node.children || node.children.length === 0) {
            // 如果是叶子节点，根据计数器计算位置
            y = padding.top + currentLeafIndex * leafHeight;
            currentLeafIndex++;
        } else {
            // 如果是分支节点，先计算所有子节点
            const childPositions = node.children.map(child => {
                // 子节点的 x 坐标根据深度增加
                const childX = x + 180; // 每层宽度
                return drawNode(child, childX, depth + 1, y); // 递归
            });
            // 自己的 Y 坐标是第一个和最后一个子节点的中间
            y = (childPositions[0] + childPositions[childPositions.length - 1]) / 2;
            
            // 绘制连接线 (贝塞尔曲线)
            node.children.forEach((child, index) => {
                const childY = childPositions[index];
                const childX = x + 180;
                
                ctx.beginPath();
                ctx.moveTo(x, y);
                // 贝塞尔曲线控制点，使线条更平滑
                ctx.bezierCurveTo(x + 90, y, x + 90, childY, childX, childY);
                ctx.strokeStyle = '#ccc';
                ctx.lineWidth = 2;
                ctx.stroke();
            });
        }

        // 2. 绘制节点图标
        ctx.beginPath();
        let radius = node.type === 'species' ? 6 : 4;
        ctx.arc(x, y, radius, 0, 2 * Math.PI);
        
        // 颜色判断
        if (node.status === 'complete') {
            ctx.fillStyle = '#2E7D32'; // 绿
        } else if (node.status === 'missing') {
            ctx.fillStyle = '#C62828'; // 红
        } else {
            ctx.fillStyle = '#999'; // 灰
        }
        ctx.fill();

        // 3. 绘制文字标签
        ctx.font = node.type === 'species' ? 'bold 14px Arial' : '12px Arial';
        ctx.fillStyle = node.type === 'species' ? '#000' : '#666';
        ctx.textBaseline = 'middle';
        
        let label = node.name;
        let labelX = x + 12;
        
        ctx.fillText(label, labelX, y);

        // 4. 绘制备注 (缺失信息)
        if (node.note) {
             ctx.font = 'italic 11px Arial';
             ctx.fillStyle = node.status === 'missing' ? '#D32F2F' : '#555';
             // 如果是叶子节点，备注写在名字后面；如果是分支，写在名字下方
             if (node.type === 'species') {
                 const nameWidth = ctx.measureText(node.name).width;
                 ctx.fillText(`[${node.note}]`, labelX + nameWidth + 10, y);
             } else {
                 ctx.fillText(node.note, labelX, y + 15);
             }
        }

        return y; // 返回当前节点的 y 坐标供父节点使用
    }

    // 开始绘制
    // 根节点位置
    const rootX = padding.left;
    drawNode(treeData, rootX, 0, height / 2);

</script>

</body>
</html>
